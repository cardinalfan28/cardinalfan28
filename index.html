<div class="page">

<!-- Extra space so users have to scroll to the history -->
<div class="spacer">

<h2>Break History</h2>

<button id="deleteAll">Delete All Breaks</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Day</th>
<th>Start Time</th>
<th>End Time</th>
<th>Length</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>





    <script>

// ----------------------------------------------------
// Change this to your own backend API.
// LocalStorage is used as a fallback.
// ----------------------------------------------------
const API_URL = ""; // Example: "https://yourserver.com/api/breaks"

let startTime = null;
let timerInterval = null;

const timer = document.getElementById("timer");
const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const historyBody = document.getElementById("history");

function pad(n){
    return String(n).padStart(2,"0");
}

function updateTimer(){

    const elapsed = Date.now() - startTime;

    const totalSeconds = Math.floor(elapsed/1000);

    const hours = Math.floor(totalSeconds/3600);
    const minutes = Math.floor((totalSeconds%3600)/60);
    const seconds = totalSeconds%60;

    timer.textContent =
        pad(hours)+":"+
        pad(minutes)+":"+
        pad(seconds);
}

function formatDuration(ms){

    let mins = Math.floor(ms/60000);

    const days = Math.floor(mins/1440);
    mins %= 1440;

    const hrs = Math.floor(mins/60);
    mins %= 60;

    return `${days}d ${hrs}h ${mins}m`;
}

startBtn.onclick = function(){

    startTime = Date.now();

    updateTimer();

    timerInterval = setInterval(updateTimer,1000);

    startBtn.style.display="none";
    stopBtn.style.display="inline-block";

};

stopBtn.onclick = async function(){

    clearInterval(timerInterval);

    const endTime = Date.now();

    const start = new Date(startTime);
    const end = new Date(endTime);

    const record = {

        date:start.toLocaleDateString(),

        day:start.toLocaleDateString(undefined,{
            weekday:"long"
        }),

        start:start.toLocaleTimeString(),

        end:end.toLocaleTimeString(),

        length:formatDuration(endTime-startTime)

    };

    // If you have a backend, save there.
    if(API_URL){

        await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(record)
        });

        loadHistory();

    }else{

        // Local fallback
        let data = JSON.parse(localStorage.getItem("pixelBreakHistory")||"[]");
        data.push(record);
        localStorage.setItem("pixelBreakHistory",JSON.stringify(data));
        loadHistory();

    }

    timer.textContent="00:00:00";

    startBtn.style.display="inline-block";
    stopBtn.style.display="none";

};


async function loadHistory(){

    historyBody.innerHTML="";

    let data=[];

    if(API_URL){

        const response = await fetch(API_URL);
        data = await response.json();

    }else{

        data = JSON.parse(localStorage.getItem("pixelBreakHistory")||"[]");

    }


    data.reverse().forEach((item,index)=>{

        const originalIndex = data.length - 1 - index;

        historyBody.innerHTML += `
        <tr>
            <td>${item.date}</td>
            <td>${item.day}</td>
            <td>${item.start}</td>
            <td>${item.end}</td>
            <td>${item.length}</td>
            <td>
                <button onclick="deleteRow(${originalIndex})">
                    Delete
                </button>
            </td>
        </tr>
        `;

    });

}






        function deleteRow(index){

    let data = JSON.parse(
        localStorage.getItem("pixelBreakHistory") || "[]"
    );

    data.splice(index,1);

    localStorage.setItem(
        "pixelBreakHistory",
        JSON.stringify(data)
    );

    loadHistory();
}


document.getElementById("deleteAll").onclick = function(){

    if(confirm("Delete all break history?")){

        localStorage.removeItem("pixelBreakHistory");

        loadHistory();

    }

};


loadHistory();

</script>
